services:
  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: soc
      POSTGRES_PASSWORD: soc
      POSTGRES_DB: soc_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc -d soc_db"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - soc-network

volumes:
  postgres_data:

networks:
  soc-network:
    external: false
